name: Update Checker

on:
  workflow_dispatch:
  schedule:
  - cron: "0 22 * * *"

jobs:
  check:
    runs-on: ubuntu-latest

    steps:

    - name: Get Latest Stable Release
      id: getRelease
      run: |
        release_tag=$(curl --fail --silent --show-error \
          --header "Accept: application/vnd.github+json" \
          --header "X-GitHub-Api-Version: 2022-11-28" \
          https://api.github.com/repos/openwrt/openwrt/releases/latest \
          | jq -r '.tag_name')

        if [ -z "$release_tag" ] || [ "$release_tag" = "null" ]; then
          echo "No stable OpenWrt release found" >&2
          exit 1
        fi

        echo "releaseTag=$release_tag" >> "$GITHUB_OUTPUT"
        echo "Latest stable release: $release_tag"

    - name: Compare Release Tag
      id: cacheRelease
      uses: actions/cache@v4
      with:
        path: .releaseTag
        key: RELEASE-${{ steps.getRelease.outputs.releaseTag }}

    - name: Save New Release Tag
      if: steps.cacheRelease.outputs.cache-hit != 'true'
      run: |
        echo "${{ steps.getRelease.outputs.releaseTag }}" | tee .releaseTag

    - name: Trigger build
      if: steps.cacheRelease.outputs.cache-hit != 'true'
      uses: peter-evans/repository-dispatch@v3
      with:
        token: ${{ secrets.ACTIONS_TRIGGER_PAT }}
        event-type: Source Code Update

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 0
        keep_minimum_runs: 1
